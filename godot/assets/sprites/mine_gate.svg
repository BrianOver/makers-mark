<svg xmlns="http://www.w3.org/2000/svg" width="40" height="120" viewBox="0 0 40 120">
  <!-- Mine gate: an arched cave mouth ringed with teal-lit runes (the way to the Mine). -->
  <!-- rock frame -->
  <path d="M4 118 L4 34 Q20 6 36 34 L36 118 Z" fill="#2a2438" stroke="#d8cfe0" stroke-width="2"/>
  <!-- dark cave mouth, teal-edged -->
  <path d="M10 118 L10 40 Q20 18 30 40 L30 118 Z" fill="#140f1f" stroke="#3fb0ac" stroke-width="1.5"/>
  <!-- teal-lit runes on the arch -->
  <circle cx="20" cy="30" r="2.5" fill="none" stroke="#3fb0ac" stroke-width="1.5"/>
  <path d="M12 46 l2 3 -2 3 M28 46 l-2 3 2 3" stroke="#3fb0ac" stroke-width="1.5" fill="none"/>
  <!-- purple keystone rune -->
  <path d="M20 20 l3 5 -3 5 -3 -5 Z" fill="none" stroke="#6b4c9a" stroke-width="1.5"/>
  <!-- ember rim light, upper-left -->
  <path d="M5 40 Q20 8 34 34" stroke="#e0913f" stroke-width="1.2" opacity="0.5" fill="none"/>
</svg>
