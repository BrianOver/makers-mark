name: CI

# Three lanes: sim-tests (fast, no Godot), balance-sim, engine-tests (headless Godot).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  sim-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Fast lane — sim suite (no Godot)
        run: dotnet test sim/GameSim.Tests/GameSim.Tests.csproj --filter "Category!=Balance" --logger "trx;LogFileName=sim-tests.trx"
      - name: Fast lane — art conformance (no Godot, no IO; describe-PR definition of done)
        run: dotnet test art/GameArt.Tests/GameArt.Tests.csproj --logger "trx;LogFileName=art-tests.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sim-test-results
          path: sim/GameSim.Tests/TestResults/*.trx

  balance-sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Balance gate — 100-day sim (placeholder until U10)
        run: dotnet test sim/GameSim.Tests/GameSim.Tests.csproj --filter "Category=Balance" --logger "trx;LogFileName=balance-sim.trx"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: balance-test-results
          path: sim/GameSim.Tests/TestResults/*.trx

  engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3   # keep in sync with .godot-version
          use-dotnet: true
          include-templates: false
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - uses: actions/cache@v4
        with:
          path: godot/.godot
          key: godot-import-${{ hashFiles('godot/project.godot', 'godot/**/*.tscn', 'godot/**/*.cs') }}
          restore-keys: godot-import-
      - name: Import project (known-flaky step; failures surface in the test step)
        run: godot --headless --path godot --import --quit-after 200
        continue-on-error: true
      - name: Restore csproj after import (Godot editor injects a net8 TFM downgrade)
        run: git checkout -- godot/GodotClient.csproj
      - name: Warm up Godot .NET (compile solutions, load assemblies once)
        run: |
          dotnet build Game.sln
          godot --headless --path godot --build-solutions --quit-after 2 || true
          git checkout -- godot/GodotClient.csproj
      - name: Install xvfb (gdUnit4Net launches Godot WITHOUT --headless; it needs a display)
        run: sudo apt-get update -q && sudo apt-get install -y -q xvfb
      - name: Engine tests (Godot under virtual display; one retry)
        run: |
          export GODOT_BIN=$(which godot)
          xvfb-run -a dotnet test godot/tests/GodotClient.Tests.csproj --logger "trx;LogFileName=engine-tests.trx"             || xvfb-run -a dotnet test godot/tests/GodotClient.Tests.csproj --logger "trx;LogFileName=engine-tests-retry.trx"
      - name: Assert runtime suite actually ran (silent-skip guard, KTD3)
        run: |
          export GODOT_BIN=$(which godot)
          xvfb-run -a dotnet test godot/tests/GodotClient.Tests.csproj --filter "FullyQualifiedName~MainUiTests" -- RunConfiguration.TreatNoTestsAsError=true
      - name: Restore csproj after tests
        if: always()
        run: git checkout -- godot/GodotClient.csproj
      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== adapter dir ==="; ls -la godot/gdunit4_testadapter_v5/ 2>/dev/null || true
          echo "=== recent logs ==="; find . -name "*.log" -mmin -20 2>/dev/null | head -10
          find . -name "*.log" -mmin -20 -exec sh -c 'echo "--- $1"; tail -60 "$1"' _ {} \; 2>/dev/null | head -200
          echo "=== godot user dir logs ==="; find ~/.local/share/godot -name "*.log" 2>/dev/null -exec sh -c 'echo "--- $1"; tail -40 "$1"' _ {} \; | head -120
          echo "=== manual runner launch ==="
          RUNNER=$(find godot/gdunit4_testadapter_v5 -name "*.tscn" 2>/dev/null | head -1)
          echo "runner scene: $RUNNER"
          if [ -n "$RUNNER" ]; then timeout 40 godot --headless --path godot "res://gdunit4_testadapter_v5/$(basename $RUNNER)" 2>&1 | head -50 || true; fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: engine-test-results
          path: godot/tests/TestResults/**/*.trx
          if-no-files-found: ignore
